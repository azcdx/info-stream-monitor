<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>信息流监控助手</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
      display: flex;
      flex-direction: column;
    }

    .container {
      padding: 10px;
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 8px;
      margin-bottom: 8px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .card-header {
      padding: 8px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }

    .card-header:hover {
      background: rgba(0, 0, 0, 0.02);
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: #1f2937;
    }

    .card-toggle {
      font-size: 11px;
      color: #6b7280;
    }

    .card-body {
      display: none;
    }

    .card-body.expanded {
      display: block;
    }

    .source-item {
      display: flex;
      align-items: center;
      padding: 6px 12px;
      border-bottom: 1px solid #f3f4f6;
    }

    .source-item:last-child {
      border-bottom: none;
    }

    .source-checkbox {
      width: 14px;
      height: 14px;
      margin-right: 8px;
      cursor: pointer;
    }

    .source-label {
      flex: 1;
      font-size: 12px;
      color: #374151;
    }

    .stats {
      display: flex;
      justify-content: space-around;
      padding: 8px 12px;
      text-align: center;
    }

    .stat-item {
      flex: 1;
    }

    .stat-value {
      font-size: 16px;
      font-weight: 700;
      color: #667eea;
    }

    .stat-label {
      font-size: 10px;
      color: #6b7280;
    }

    .buttons {
      display: flex;
      gap: 6px;
      padding: 0 12px 8px;
    }

    .btn {
      flex: 1;
      padding: 6px 12px;
      border: none;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #667eea;
      color: #ffffff;
    }

    .btn-primary:hover {
      background: #5a67d8;
    }

    .btn-danger {
      background: #ef4444;
      color: #ffffff;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    /* 最近通知 - 填充剩余高度 */
    .recent-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .recent-card .card-body {
      flex: 1;
      display: none;
      flex-direction: column;
      min-height: 0;
      padding: 0;
    }

    .recent-card .card-body.expanded {
      display: flex;
    }

    .recent {
      flex: 1;
      overflow-y: auto;
      padding: 6px 10px;
    }

    .recent::-webkit-scrollbar {
      width: 4px;
    }

    .recent::-webkit-scrollbar-track {
      background: #f3f4f6;
    }

    .recent::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 2px;
    }

    .recent-item {
      padding: 5px 8px;
      border-radius: 5px;
      margin-bottom: 3px;
      background: #f9fafb;
      border-left: 2px solid #667eea;
      transition: background 0.2s;
    }

    .recent-item:hover {
      background: #f3f4f6;
    }

    .recent-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 3px;
      flex-wrap: wrap;
      gap: 4px;
    }

    .recent-type {
      font-size: 11px;
    }

    .recent-source {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 4px;
      background: rgba(102, 126, 234, 0.1);
      color: #667eea;
      flex: 1;
    }

    .recent-score {
      font-size: 9px;
      color: #f59e0b;
      font-weight: 500;
      white-space: nowrap;
    }

    .recent-actions {
      display: flex;
      gap: 3px;
    }

    .recent-title {
      font-size: 11px;
      font-weight: 500;
      color: #1f2937;
      line-height: 1.3;
    }

    .recent-btn {
      padding: 2px 6px;
      border: none;
      border-radius: 3px;
      font-size: 9px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .recent-btn-link {
      background: #dbeafe;
      color: #2563eb;
    }

    .recent-btn-link:hover {
      background: #bfdbfe;
    }

    .recent-btn-fav {
      background: #fef3c7;
      color: #d97706;
    }

    .recent-btn-fav:hover {
      background: #fde68a;
    }

    .empty-state {
      text-align: center;
      padding: 30px 12px;
      color: #9ca3af;
      font-size: 12px;
    }

    .footer {
      margin-top: 8px;
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .footer-btn {
      flex: 1;
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: #ffffff;
      padding: 8px;
      border-radius: 5px;
      font-size: 11px;
      cursor: pointer;
    }

    .footer-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .fold-indicator {
      display: inline-block;
      transition: transform 0.2s;
    }

    .fold-indicator.expanded {
      transform: rotate(180deg);
    }

    .status-bar {
      padding: 6px 10px;
      text-align: center;
      font-size: 11px;
      color: #ffffff;
      opacity: 0.9;
      flex-shrink: 0;
    }

    .status.running {
      color: #4ade80;
    }

    .status.stopped {
      color: #f87171;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="status-bar" id="status">初始化中...</div>

    <div class="card">
      <div class="card-header" id="sources-toggle">
        <span class="card-title">监控源</span>
        <span class="card-toggle"><span class="fold-indicator">▼</span></span>
      </div>
      <div class="card-body expanded" id="sources-body">
        <div class="source-item">
          <input type="checkbox" class="source-checkbox" id="jin10" checked>
          <label class="source-label" for="jin10">金十数据</label>
        </div>
        <div class="source-item">
          <input type="checkbox" class="source-checkbox" id="twitter">
          <label class="source-label" for="twitter">推特</label>
        </div>
        <div class="source-item">
          <input type="checkbox" class="source-checkbox" id="reddit">
          <label class="source-label" for="reddit">红迪</label>
        </div>
        <div class="buttons">
          <button class="btn btn-primary" id="start-btn">开始</button>
          <button class="btn btn-danger" id="stop-btn" style="display: none;">停止</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header" id="stats-toggle">
        <span class="card-title">统计</span>
        <span class="card-toggle"><span class="fold-indicator">▼</span></span>
      </div>
      <div class="card-body expanded" id="stats-body">
        <div class="stats">
          <div class="stat-item">
            <div class="stat-value" id="total-count">0</div>
            <div class="stat-label">捕获</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="valuable-count">0</div>
            <div class="stat-label">高价值</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="favorite-count">0</div>
            <div class="stat-label">收藏</div>
          </div>
        </div>
      </div>
    </div>

    <div class="card recent-card">
      <div class="card-header" id="recent-toggle">
        <span class="card-title">通知</span>
        <span class="card-toggle"><span class="fold-indicator expanded">▼</span></span>
      </div>
      <div class="card-body expanded" id="recent-body">
        <div class="recent" id="recent-list">
          <div class="empty-state">
            <div style="font-size: 24px; margin-bottom: 6px;">📭</div>
            <div>暂无通知</div>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">
      <button class="footer-btn" id="config-btn">设置</button>
      <button class="footer-btn" id="favorites-btn">收藏夹</button>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
